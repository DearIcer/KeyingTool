<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>绿幕抠像与裁剪工具（扩散图 / 复杂边缘优化版）</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --primary: #18a058;
      --primary-dark: #128848;
      --text: #333;
      --border: #ddd;
      --shadow: 0 2px 8px rgba(0,0,0,.08);
      --accent: #00ffcc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: var(--panel);
      padding: 16px 24px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 { margin: 0; font-size: 20px; }
    .upload-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #dropZone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      transition: .2s;
      font-size: 14px;
      color: #666;
      user-select: none;
    }
    #dropZone:hover, #dropZone.drag-over, #dropZone:focus-visible {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(24,160,88,.06);
      outline: none;
    }
    #fileInput { display: none; }

    main {
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
    }
    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; }
    }

    .stage {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .panel {
      background: var(--panel);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .panel h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #555;
    }

    .image-wrapper {
      position: relative;
      display: block;
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      line-height: 0;
      text-align: center;
    }
    .image-wrapper.picking {
      cursor: crosshair;
    }
    .image-wrapper img,
    .image-wrapper canvas {
      max-width: 100%;
      max-height: 55vh;
      display: block;
      margin: 0 auto;
      border: none;
      box-shadow: 0 0 0 1px var(--border);
      border-radius: 6px;
    }

    .preview-viewport {
      display: none;
      position: relative;
      width: 100%;
      height: 55vh;
      overflow: hidden;
      background: #fff;
      background-image:
        linear-gradient(45deg, #e8e8e8 25%, transparent 25%),
        linear-gradient(-45deg, #e8e8e8 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e8e8e8 75%),
        linear-gradient(-45deg, transparent 75%, #e8e8e8 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: grab;
      touch-action: none;
    }
    .preview-viewport.active { display: block; }
    .preview-viewport:active { cursor: grabbing; }
    .preview-viewport canvas {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      max-width: none;
      max-height: none;
      border: none;
      border-radius: 0;
      margin: 0;
      box-shadow: none;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .crop-box {
      position: absolute;
      border: 2px dashed var(--accent);
      background: rgba(0, 255, 204, 0.08);
      pointer-events: auto;
      touch-action: none;
      cursor: move;
      min-width: 20px;
      min-height: 20px;
    }
    .crop-box::after {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,.6);
      pointer-events: none;
    }
    .handle {
      position: absolute;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border: 1px solid #fff;
      border-radius: 50%;
      pointer-events: auto;
      touch-action: none;
    }
    .handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
    .handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
    .handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
    .handle.se { bottom: -6px; right: -6px; cursor: se-resize; }
    .handle.n  { top: -6px; left: 50%; transform: translateX(-50%); cursor: n-resize; }
    .handle.s  { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
    .handle.w  { left: -6px; top: 50%; transform: translateY(-50%); cursor: w-resize; }
    .handle.e  { right: -6px; top: 50%; transform: translateY(-50%); cursor: e-resize; }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .control-group { display: flex; flex-direction: column; gap: 6px; }
    .control-group label { font-size: 13px; color: #666; display: flex; justify-content: space-between; }
    .control-group input[type="range"] { width: 100%; }
    .control-group input[type="number"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
    }
    .color-row {
      display: flex;
      gap: 8px;
    }
    .color-row input[type="color"] {
      flex: 1;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
    }
    .btn {
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: .2s;
      padding: 0 14px;
      height: 36px;
      white-space: nowrap;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn:disabled { background: #bbb; cursor: not-allowed; }
    .btn.secondary { background: #4a90d9; }
    .btn.secondary:hover { background: #357abd; }
    .btn.active { background: #e6a23c; }
    .btn.active:hover { background: #cf8f2e; }

    .crop-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .export-btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      margin-top: 4px;
    }

    .empty-tip {
      color: #999;
      font-size: 14px;
      text-align: center;
      padding: 40px 20px;
    }

    .value { font-weight: 600; color: var(--text); }

    .hint {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
    }

    .tip-icon {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #d0d0d0;
      color: #fff;
      font-size: 11px;
      cursor: help;
      margin-left: 4px;
      font-weight: 700;
      vertical-align: middle;
    }
    .tip-icon:hover { background: #999; }
    .tip-icon::after {
      content: attr(data-tip);
      position: absolute;
      top: 120%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, .88);
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: normal;
      line-height: 1.4;
      white-space: normal;
      width: max-content;
      max-width: 220px;
      text-align: left;
      opacity: 0;
      visibility: hidden;
      transition: opacity .2s, visibility .2s;
      z-index: 100;
      pointer-events: none;
    }
    .tip-icon:hover::after {
      opacity: 1;
      visibility: visible;
    }

    .radio-row, .checkbox-row {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: #555;
    }
    .radio-row label, .checkbox-row label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-weight: normal;
      justify-content: flex-start;
    }
    .radio-row input, .checkbox-row input { cursor: pointer; }

    .noscript-tip {
      background: #fff3cd;
      color: #856404;
      padding: 16px 24px;
      text-align: center;
      border-bottom: 1px solid #e0d0a0;
    }
  </style>
</head>
<body>
  <noscript>
    <div class="noscript-tip">本工具需要启用 JavaScript 才能运行。请在浏览器设置中开启 JavaScript 后刷新页面。</div>
  </noscript>

  <header>
    <h1>🎬 绿幕抠像与裁剪工具（扩散图 / 复杂边缘优化版）</h1>
    <div class="upload-wrap">
      <div id="dropZone" role="button" tabindex="0" aria-label="点击或拖拽上传图片">点击或拖拽上传图片</div>
      <input type="file" id="fileInput" accept="image/*" aria-label="上传图片文件" />
    </div>
  </header>

  <main>
    <div class="workspace">
      <div class="stage">
        <div class="panel">
          <h2>原图与裁剪区</h2>
          <div class="image-wrapper" id="sourceWrapper">
            <div class="empty-tip" id="emptyTip">请先上传一张绿幕图片</div>
            <img id="sourceImg" style="display:none;" alt="上传的图片" />
            <div class="overlay" id="overlay" style="display:none;">
              <div class="crop-box" id="cropBox">
                <div class="handle nw" data-handle="nw"></div>
                <div class="handle ne" data-handle="ne"></div>
                <div class="handle sw" data-handle="sw"></div>
                <div class="handle se" data-handle="se"></div>
                <div class="handle n" data-handle="n"></div>
                <div class="handle s" data-handle="s"></div>
                <div class="handle w" data-handle="w"></div>
                <div class="handle e" data-handle="e"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="panel">
          <h2>抠像预览（滚轮缩放 / 拖拽平移）</h2>
          <div class="image-wrapper preview-viewport" id="previewViewport">
            <canvas id="previewCanvas"></canvas>
          </div>
          <div class="empty-tip" id="previewEmpty">预览将显示在这里</div>
        </div>
      </div>

      <aside class="panel controls">
        <h2>抠像参数</h2>

        <div class="control-group">
          <label for="keyColor">抠像颜色</label>
          <div class="color-row">
            <input type="color" id="keyColor" value="#00ff00" />
            <button class="btn secondary" id="sampleBtn">取样背景</button>
          </div>
        </div>

        <div class="control-group">
          <button class="btn" id="animePresetBtn" style="width:100%;">应用二次元推荐参数</button>
        </div>

        <div class="control-group">
          <label for="hueTolerance">色相容差 <span class="tip-icon" data-tip="色相与取样背景色的允许偏差角度，越大越宽容" tabindex="0">?</span> <span id="hueToleranceVal" class="value">30</span>°</label>
          <input type="range" id="hueTolerance" min="0" max="180" value="30" />
        </div>

        <div class="control-group">
          <label for="greenThreshold">绿色浓度 <span class="tip-icon" data-tip="绿色通道领先红蓝通道的程度，用于识别绿色背景" tabindex="0">?</span> <span id="greenThresholdVal" class="value">25</span></label>
          <input type="range" id="greenThreshold" min="0" max="100" value="25" />
        </div>

        <div class="control-group">
          <label for="tolerance">综合容差 <span class="tip-icon" data-tip="整体容差，越小保留的主体颜色越严格" tabindex="0">?</span> <span id="toleranceVal" class="value">20</span></label>
          <input type="range" id="tolerance" min="0" max="100" value="20" />
        </div>

        <div class="control-group">
          <label for="feather">边缘羽化 <span class="tip-icon" data-tip="背景到前景的过渡宽度，越大边缘越柔和" tabindex="0">?</span> <span id="featherVal" class="value">30</span></label>
          <input type="range" id="feather" min="0" max="100" value="30" />
        </div>

        <div class="control-group">
          <label for="edgeBlur">边缘抗锯齿 <span class="tip-icon" data-tip="对 Alpha 通道做轻微高斯模糊，可减轻锯齿；过高会让边缘发虚" tabindex="0">?</span> <span id="edgeBlurVal" class="value">1</span></label>
          <input type="range" id="edgeBlur" min="0" max="3" value="1" />
        </div>

        <div class="control-group">
          <label for="strokeProtect">补充描边 <span class="tip-icon" data-tip="检测原图中比周围明显暗的线条并补回 alpha；0=关闭，适合修复被误抠的描边" tabindex="0">?</span> <span id="strokeProtectVal" class="value">0</span></label>
          <input type="range" id="strokeProtect" min="0" max="100" value="0" />
        </div>

        <div class="control-group">
          <label for="strokeColor">描边颜色 <span class="tip-icon" data-tip="补充描边时直接使用的颜色，建议选黑色或深灰色" tabindex="0">?</span></label>
          <input type="color" id="strokeColor" value="#000000" />
        </div>

        <div class="control-group">
          <label for="edgeFill">边缘填色 <span class="tip-icon" data-tip="用附近非绿实色前景替换边缘（包括半透明和紧贴背景的实色绿边）的颜色，对扩散图头发/蕾丝绿边效果更稳；0=关闭" tabindex="0">?</span> <span id="edgeFillVal" class="value">0</span></label>
          <input type="range" id="edgeFill" min="0" max="100" value="0" />
        </div>

        <div class="control-group">
          <label for="spill">溢色抑制 <span class="tip-icon" data-tip="去除绿色溢出的强度，可减轻头发、衣服边缘的绿边" tabindex="0">?</span> <span id="spillVal" class="value">80</span></label>
          <input type="range" id="spill" min="0" max="100" value="80" />
        </div>

        <div class="control-group">
          <label for="spillRange">去绿范围 <span class="tip-icon" data-tip="距离背景色多远仍会被当作绿边处理" tabindex="0">?</span> <span id="spillRangeVal" class="value">40</span></label>
          <input type="range" id="spillRange" min="0" max="100" value="40" />
        </div>

        <div class="control-group">
          <label>去绿模式 <span class="tip-icon" data-tip="仅对半透明边缘去绿可保护主体颜色；全图去绿可清理实心绿边" tabindex="0">?</span></label>
          <div class="radio-row">
            <label><input type="radio" name="spillMode" value="edge" checked /> 仅半透明边缘</label>
            <label><input type="radio" name="spillMode" value="global" /> 全图去绿</label>
          </div>
        </div>

        <div class="control-group">
          <div class="checkbox-row">
            <label>
              <input type="checkbox" id="localDespill" checked />
              局部背景去绿
              <span class="tip-icon" data-tip="根据每个边缘像素附近的实际背景色去绿，对扩散图不均匀绿幕和头发/蕾丝等复杂边缘效果更好" tabindex="0">?</span>
            </label>
          </div>
        </div>

        <div class="control-group">
          <label for="fringeClean">边缘清绿 <span class="tip-icon" data-tip="用附近实色前景替换半透明边缘的残余绿色，适合处理头发、蕾丝等复杂边角" tabindex="0">?</span> <span id="fringeCleanVal" class="value">40</span></label>
          <input type="range" id="fringeClean" min="0" max="100" value="40" />
        </div>

        <p class="hint">
          提示：扩散生成图的背景往往不均匀，建议点击“取样背景”在原图绿色区域取色。新版策略以“边缘填色”为主：不强行去绿，而是用附近非绿实色前景覆盖绿边，对头发、蕾丝等复杂边角更稳。若仍有绿边，优先调高“边缘填色”，再视情况补一点“边缘清绿”。
        </p>

        <h2 style="margin-top:8px;">裁剪区域（像素）</h2>
        <div class="crop-inputs">
          <div class="control-group">
            <label for="cropX">X</label>
            <input type="number" id="cropX" min="0" value="0" />
          </div>
          <div class="control-group">
            <label for="cropY">Y</label>
            <input type="number" id="cropY" min="0" value="0" />
          </div>
          <div class="control-group">
            <label for="cropW">宽</label>
            <input type="number" id="cropW" min="1" value="0" />
          </div>
          <div class="control-group">
            <label for="cropH">高</label>
            <input type="number" id="cropH" min="1" value="0" />
          </div>
        </div>

        <button class="btn export-btn" id="exportBtn" disabled>导出透明 PNG</button>
      </aside>
    </div>
  </main>

  <!-- 离屏画布 -->
  <canvas id="originalCanvas" style="display:none;"></canvas>
  <canvas id="processedCanvas" style="display:none;"></canvas>

  <script>
    // ---- Worker（在后台线程执行像素级抠像，避免 UI 卡死）----
    const workerCode = `
function parseHex(hex) {
  const m = hex.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  if (!m) return [0, 255, 0];
  return [parseInt(m[1], 16), parseInt(m[2], 16), parseInt(m[3], 16)];
}
function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  const d = max - min;
  let h = 0;
  if (d !== 0) {
    if (max === r) h = ((g - b) / d + 6) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60;
  }
  const s = max === 0 ? 0 : d / max;
  const v = max;
  return [h, s, v];
}
function hueDiff(h1, h2) {
  let d = Math.abs(h1 - h2);
  return Math.min(d, 360 - d);
}
function smoothstep(edge0, edge1, x) {
  if (edge0 >= edge1) return x >= edge1 ? 1 : 0;
  const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
  return t * t * (3 - 2 * t);
}
function blurAlpha(data, width, height, radius) {
  if (radius <= 0) return;
  const len = width * height;
  const src = new Float32Array(len);
  for (let i = 0; i < len; i++) src[i] = data[i * 4 + 3];
  const temp = new Float32Array(len);
  const size = radius * 2 + 1;
  const kernel = new Float32Array(size);
  const sigma = Math.max(0.5, radius / 2);
  let sum = 0;
  for (let i = 0; i < size; i++) {
    const x = i - radius;
    const v = Math.exp(-(x * x) / (2 * sigma * sigma));
    kernel[i] = v;
    sum += v;
  }
  for (let i = 0; i < size; i++) kernel[i] /= sum;
  for (let y = 0; y < height; y++) {
    const rowStart = y * width;
    for (let x = 0; x < width; x++) {
      let s = 0;
      for (let k = -radius; k <= radius; k++) {
        const px = Math.min(width - 1, Math.max(0, x + k));
        s += src[rowStart + px] * kernel[k + radius];
      }
      temp[rowStart + x] = s;
    }
  }
  for (let x = 0; x < width; x++) {
    for (let y = 0; y < height; y++) {
      let s = 0;
      for (let k = -radius; k <= radius; k++) {
        const py = Math.min(height - 1, Math.max(0, y + k));
        s += temp[py * width + x] * kernel[k + radius];
      }
      src[y * width + x] = s;
    }
  }
  for (let i = 0; i < len; i++) {
    data[i * 4 + 3] = Math.max(0, Math.min(255, Math.round(src[i])));
  }
}
function fillEdgeColor(data, width, height, strength) {
  if (strength <= 0) return;
  const radius = 5;
  const solidThreshold = 200;
  const bgThreshold = 30;
  const bgNeighborRadius = 2;

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const idx = (y * width + x) * 4;
      const a = data[idx + 3];
      if (a <= 0) continue;

      const r = data[idx], g = data[idx + 1], b = data[idx + 2];
      const greenness = g - Math.max(r, b);

      // 判断是否在边缘：有背景邻居，或本身是半透明
      let hasBgNeighbor = false;
      for (let dy = -bgNeighborRadius; dy <= bgNeighborRadius && !hasBgNeighbor; dy++) {
        for (let dx = -bgNeighborRadius; dx <= bgNeighborRadius && !hasBgNeighbor; dx++) {
          if (dx === 0 && dy === 0) continue;
          const py = Math.min(height - 1, Math.max(0, y + dy));
          const px = Math.min(width - 1, Math.max(0, x + dx));
          const nidx = (py * width + px) * 4;
          if (data[nidx + 3] <= bgThreshold) hasBgNeighbor = true;
        }
      }
      const isSemiTransparent = a > 0 && a < 245;
      if (!hasBgNeighbor && !isSemiTransparent) continue;

      // 在更大范围内收集实色前景，按距离和非绿程度加权
      let sr = 0, sg = 0, sb = 0, totalWeight = 0;
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          if (dx === 0 && dy === 0) continue;

    function loadImage(file) {
      if (!file || !file.type.startsWith('image/')) {
        alert('请选择图片文件。');
        return;
      }
      currentFileName = file.name;
      const reader = new FileReader();
      reader.onerror = () => alert('读取文件失败，请重试。');
      reader.onload = (e) => {
        const url = e.target.result;
        const img = new Image();
        img.onerror = () => alert('图片加载失败，请检查文件格式。');
        img.onload = () => {
          try {
            originalImage = img;
            imgWidth = img.width;
            imgHeight = img.height;

            originalCanvas.width = imgWidth;
            originalCanvas.height = imgHeight;
            originalCanvas.getContext('2d').drawImage(img, 0, 0);

            processedCanvas.width = imgWidth;
            processedCanvas.height = imgHeight;

            resetCrop();
            emptyTip.style.display = 'none';
            sourceImg.style.display = 'block';
            overlay.style.display = 'block';
            exportBtn.disabled = false;

            // 先绑定 onload 再设置 src，避免缓存导致回调丢失
            sourceImg.onload = () => {
              previewEmpty.style.display = 'none';
              previewViewport.classList.add('active');
              updatePreviewViewportSize();
              updateCropOverlay();
              fitPreview();
            };
            sourceImg.src = url;

            processImage();
          } catch (err) {
            console.error(err);
            alert('加载图片失败：' + (err.message || '可能是图片过大或格式不受支持。'));
          }
        };
        img.src = url;
      };
      reader.readAsDataURL(file);
    }

    function applyAnimePreset() {
      keyColorInput.value = '#00ff00';
      hueToleranceInput.value = 35;
      greenThresholdInput.value = 30;
      toleranceInput.value = 14;
      featherInput.value = 16;
      spillInput.value = 70;
      spillRangeInput.value = 45;
      edgeBlurInput.value = 0;
      strokeProtectInput.value = 0;
      edgeFillInput.value = 65;
      localDespillInput.checked = true;
      fringeCleanInput.value = 35;

      hueToleranceVal.textContent = 35;
      greenThresholdVal.textContent = 30;
      toleranceVal.textContent = 14;
      featherVal.textContent = 16;
      spillVal.textContent = 70;
      spillRangeVal.textContent = 45;
      edgeBlurVal.textContent = 0;
      strokeProtectVal.textContent = 0;
      edgeFillVal.textContent = 65;
      fringeCleanVal.textContent = 35;
      scheduleProcess();
    }

    function sampleBackground(e) {
      if (!originalImage) return;
      const rect = sourceImg.getBoundingClientRect();
      let x = e.clientX - rect.left;
      let y = e.clientY - rect.top;
      x = Math.max(0, Math.min(x, rect.width));
      y = Math.max(0, Math.min(y, rect.height));

      const scaleX = imgWidth / rect.width;
      const scaleY = imgHeight / rect.height;
      const ix = Math.floor(x * scaleX);
      const iy = Math.floor(y * scaleY);

      const srcCtx = originalCanvas.getContext('2d');
      const srcData = srcCtx.getImageData(0, 0, imgWidth, imgHeight).data;

      // 5x5 平均采样，避免噪点
      let sr = 0, sg = 0, sb = 0, n = 0;
      for (let dy = -2; dy <= 2; dy++) {
        for (let dx = -2; dx <= 2; dx++) {
          const px = Math.min(imgWidth - 1, Math.max(0, ix + dx));
          const py = Math.min(imgHeight - 1, Math.max(0, iy + dy));
          const idx = (py * imgWidth + px) * 4;
          sr += srcData[idx];
          sg += srcData[idx + 1];
          sb += srcData[idx + 2];
          n++;
        }
      }
      const hex = rgbToHex(Math.round(sr / n), Math.round(sg / n), Math.round(sb / n));
      keyColorInput.value = hex;
      togglePicking(false);
      processImage();
    }

    function togglePicking(force) {
      isPicking = force !== undefined ? force : !isPicking;
      if (isPicking) {
        sampleBtn.textContent = '取消取样';
        sampleBtn.classList.add('active');
        sourceWrapper.classList.add('picking');
      } else {
        sampleBtn.textContent = '取样背景';
        sampleBtn.classList.remove('active');
        sourceWrapper.classList.remove('picking');
      }
    }

    function exportPNG() {
      if (!originalImage || crop.w <= 0 || crop.h <= 0) return;
      try {
        const canvas = document.createElement('canvas');
        canvas.width = crop.w;
        canvas.height = crop.h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(processedCanvas, crop.x, crop.y, crop.w, crop.h, 0, 0, crop.w, crop.h);
        const url = canvas.toDataURL('image/png');
        const a = document.createElement('a');
        a.href = url;
        const base = currentFileName ? currentFileName.replace(/\.[^.]+$/, '') : 'green-screen';
        a.download = base + '-cropped.png';
        document.body.appendChild(a);
        a.click();
        a.remove();
      } catch (err) {
        console.error(err);
        alert('导出失败：' + (err.message || '可能是图片过大。'));
      }
    }

    // ---- Upload ----
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        fileInput.click();
      }
    });
    fileInput.addEventListener('change', (e) => loadImage(e.target.files[0]));
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      loadImage(e.dataTransfer.files[0]);
    });

    // ---- Controls ----
    sampleBtn.addEventListener('click', () => togglePicking());
    animePresetBtn.addEventListener('click', applyAnimePreset);
    sourceWrapper.addEventListener('click', (e) => {
      if (isPicking) sampleBackground(e);
    });
    cropBox.addEventListener('click', (e) => e.stopPropagation());

    keyColorInput.addEventListener('input', scheduleProcess);

    hueToleranceInput.addEventListener('input', () => {
      hueToleranceVal.textContent = hueToleranceInput.value;
      scheduleProcess();
    });
    greenThresholdInput.addEventListener('input', () => {
      greenThresholdVal.textContent = greenThresholdInput.value;
      scheduleProcess();
    });
    toleranceInput.addEventListener('input', () => {
      toleranceVal.textContent = toleranceInput.value;
      scheduleProcess();
    });
    featherInput.addEventListener('input', () => {
      featherVal.textContent = featherInput.value;
      scheduleProcess();
    });
    spillInput.addEventListener('input', () => {
      spillVal.textContent = spillInput.value;
      scheduleProcess();
    });
    spillRangeInput.addEventListener('input', () => {
      spillRangeVal.textContent = spillRangeInput.value;
      scheduleProcess();
    });
    spillModeInputs.forEach(radio => {
      radio.addEventListener('change', scheduleProcess);
    });
    edgeBlurInput.addEventListener('input', () => {
      edgeBlurVal.textContent = edgeBlurInput.value;
      scheduleProcess();
    });
    strokeProtectInput.addEventListener('input', () => {
      strokeProtectVal.textContent = strokeProtectInput.value;
      scheduleProcess();
    });
    strokeColorInput.addEventListener('input', scheduleProcess);
    edgeFillInput.addEventListener('input', () => {
      edgeFillVal.textContent = edgeFillInput.value;
      scheduleProcess();
    });
    localDespillInput.addEventListener('change', scheduleProcess);
    fringeCleanInput.addEventListener('input', () => {
      fringeCleanVal.textContent = fringeCleanInput.value;
      scheduleProcess();
    });

    [cropXInput, cropYInput, cropWInput, cropHInput].forEach(input => {
      input.addEventListener('input', updateCropFromInputs);
    });

    exportBtn.addEventListener('click', exportPNG);

    window.addEventListener('resize', () => {
      if (!originalImage) return;
      updatePreviewViewportSize();
      updateCropOverlay();
      updatePreview();
      fitPreview();
    });

    // ---- Preview zoom & pan ----
    previewViewport.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = previewViewport.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const factor = e.deltaY < 0 ? 1.1 : 0.9;
      const newZoom = Math.max(0.5, Math.min(8, previewView.zoom * factor));

      const oldS = previewView.baseScale * previewView.zoom;
      const newS = previewView.baseScale * newZoom;
      previewView.offsetX = mx - (mx - previewView.offsetX) * (newS / oldS);
      previewView.offsetY = my - (my - previewView.offsetY) * (newS / oldS);
      previewView.zoom = newZoom;
      clampPreviewOffset();
      applyPreviewTransform();
    }, { passive: false });

    previewViewport.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      previewView.isPanning = true;
      previewView.panStartX = e.clientX;
      previewView.panStartY = e.clientY;
      previewView.panStartOffsetX = previewView.offsetX;
      previewView.panStartOffsetY = previewView.offsetY;
      previewViewport.setPointerCapture(e.pointerId);
    });
    previewViewport.addEventListener('pointermove', (e) => {
      if (!previewView.isPanning) return;
      const dx = e.clientX - previewView.panStartX;
      const dy = e.clientY - previewView.panStartY;
      previewView.offsetX = previewView.panStartOffsetX + dx;
      previewView.offsetY = previewView.panStartOffsetY + dy;
      clampPreviewOffset();
      applyPreviewTransform();
    });
    previewViewport.addEventListener('pointerup', (e) => {
      previewView.isPanning = false;
      previewViewport.releasePointerCapture(e.pointerId);
    });
    previewViewport.addEventListener('pointercancel', () => {
      previewView.isPanning = false;
    });

    // ---- Crop dragging ----
    cropBox.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (e.target.classList.contains('handle')) dragType = e.target.dataset.handle;
      else dragType = 'move';
      isDragging = true;
      startPointer = { x: e.clientX, y: e.clientY };
      const { sx, sy } = getDisplayScale();
      startCropDisplay = {
        x: crop.x / sx,
        y: crop.y / sy,
        w: crop.w / sx,
        h: crop.h / sy
      };
      cropBox.setPointerCapture(e.pointerId);
    });

    cropBox.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      e.preventDefault();
      const dx = e.clientX - startPointer.x;
      const dy = e.clientY - startPointer.y;
      const overlayW = overlay.clientWidth;
      const overlayH = overlay.clientHeight;
      let { x, y, w, h } = { ...startCropDisplay };

      if (dragType === 'move') {
        x += dx;
        y += dy;
        x = Math.max(0, Math.min(x, overlayW - w));
        y = Math.max(0, Math.min(y, overlayH - h));
      } else {
        if (dragType.includes('e')) w += dx;
        if (dragType.includes('s')) h += dy;
        if (dragType.includes('w')) { x += dx; w -= dx; }
        if (dragType.includes('n')) { y += dy; h -= dy; }

        if (x < 0) { w += x; x = 0; }
        if (y < 0) { h += y; y = 0; }
        if (x + w > overlayW) w = overlayW - x;
        if (y + h > overlayH) h = overlayH - y;
        w = Math.max(20, w);
        h = Math.max(20, h);
      }

      const { sx, sy } = getDisplayScale();
      crop.x = Math.round(x * sx);
      crop.y = Math.round(y * sy);
      crop.w = Math.round(w * sx);
      crop.h = Math.round(h * sy);
      clampCrop();
      updateCropOverlay();
      updatePreview();
    });

    cropBox.addEventListener('pointerup', (e) => {
      isDragging = false;
      dragType = null;
      cropBox.releasePointerCapture(e.pointerId);
    });
    cropBox.addEventListener('pointercancel', () => {
      isDragging = false;
      dragType = null;
    });
  </script>
</body>
</html>
