<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>绿幕抠像与裁剪工具</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --primary: #18a058;
      --primary-dark: #128848;
      --text: #333;
      --border: #ddd;
      --shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: var(--panel);
      padding: 16px 24px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 { margin: 0; font-size: 20px; }
    .upload-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #dropZone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      transition: .2s;
      font-size: 14px;
      color: #666;
      user-select: none;
    }
    #dropZone:hover, #dropZone.drag-over {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(24,160,88,.06);
    }
    #fileInput { display: none; }

    main {
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
    }
    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; }
    }

    .stage {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .panel {
      background: var(--panel);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .panel h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #555;
    }

    .image-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
      line-height: 0;
      text-align: center;
    }
    .image-wrapper img,
    .image-wrapper canvas {
      max-width: 100%;
      max-height: 55vh;
      display: block;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .crop-box {
      position: absolute;
      border: 2px dashed #00ffcc;
      background: rgba(0, 255, 204, 0.08);
      pointer-events: auto;
      touch-action: none;
      cursor: move;
      min-width: 20px;
      min-height: 20px;
    }
    .crop-box::after {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,.6);
      pointer-events: none;
    }
    .handle {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #00ffcc;
      border: 1px solid #fff;
      border-radius: 50%;
      pointer-events: auto;
      touch-action: none;
    }
    .handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
    .handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
    .handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
    .handle.se { bottom: -6px; right: -6px; cursor: se-resize; }
    .handle.n  { top: -6px; left: 50%; transform: translateX(-50%); cursor: n-resize; }
    .handle.s  { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
    .handle.w  { left: -6px; top: 50%; transform: translateY(-50%); cursor: w-resize; }
    .handle.e  { right: -6px; top: 50%; transform: translateY(-50%); cursor: e-resize; }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .control-group { display: flex; flex-direction: column; gap: 6px; }
    .control-group label { font-size: 13px; color: #666; display: flex; justify-content: space-between; }
    .control-group input[type="range"] { width: 100%; }
    .control-group input[type="number"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
    }
    .control-group input[type="color"] {
      width: 100%;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
    }
    .crop-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: .2s;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn:disabled { background: #bbb; cursor: not-allowed; }

    .empty-tip {
      color: #999;
      font-size: 14px;
      text-align: center;
      padding: 40px 20px;
    }

    .value { font-weight: 600; color: var(--text); }
  </style>
</head>
<body>
  <header>
    <h1>🎬 绿幕抠像与裁剪工具</h1>
    <div class="upload-wrap">
      <div id="dropZone">点击或拖拽上传图片</div>
      <input type="file" id="fileInput" accept="image/*" />
    </div>
  </header>

  <main>
    <div class="workspace">
      <div class="stage">
        <div class="panel">
          <h2>原图与裁剪区</h2>
          <div class="image-wrapper" id="sourceWrapper">
            <div class="empty-tip" id="emptyTip">请先上传一张绿幕图片</div>
            <img id="sourceImg" style="display:none;" alt="source" />
            <div class="overlay" id="overlay" style="display:none;">
              <div class="crop-box" id="cropBox">
                <div class="handle nw" data-handle="nw"></div>
                <div class="handle ne" data-handle="ne"></div>
                <div class="handle sw" data-handle="sw"></div>
                <div class="handle se" data-handle="se"></div>
                <div class="handle n" data-handle="n"></div>
                <div class="handle s" data-handle="s"></div>
                <div class="handle w" data-handle="w"></div>
                <div class="handle e" data-handle="e"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="panel">
          <h2>抠像预览</h2>
          <div class="image-wrapper">
            <canvas id="previewCanvas" style="display:none;"></canvas>
            <div class="empty-tip" id="previewEmpty">预览将显示在这里</div>
          </div>
        </div>
      </div>

      <aside class="panel controls">
        <h2>参数设置</h2>

        <div class="control-group">
          <label>抠像颜色</label>
          <input type="color" id="keyColor" value="#00ff00" />
        </div>

        <div class="control-group">
          <label>阈值 <span id="thresholdVal" class="value">30</span></label>
          <input type="range" id="threshold" min="0" max="120" value="30" />
        </div>

        <div class="control-group">
          <label>羽化 <span id="featherVal" class="value">20</span></label>
          <input type="range" id="feather" min="0" max="80" value="20" />
        </div>

        <h2 style="margin-top:8px;">裁剪区域（像素）</h2>
        <div class="crop-inputs">
          <div class="control-group">
            <label>X</label>
            <input type="number" id="cropX" min="0" value="0" />
          </div>
          <div class="control-group">
            <label>Y</label>
            <input type="number" id="cropY" min="0" value="0" />
          </div>
          <div class="control-group">
            <label>宽</label>
            <input type="number" id="cropW" min="1" value="0" />
          </div>
          <div class="control-group">
            <label>高</label>
            <input type="number" id="cropH" min="1" value="0" />
          </div>
        </div>

        <button class="btn" id="exportBtn" disabled>导出透明 PNG</button>
      </aside>
    </div>
  </main>

  <!-- 离屏画布，不参与显示 -->
  <canvas id="originalCanvas" style="display:none;"></canvas>
  <canvas id="processedCanvas" style="display:none;"></canvas>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const emptyTip = document.getElementById('emptyTip');
    const previewEmpty = document.getElementById('previewEmpty');
    const sourceImg = document.getElementById('sourceImg');
    const overlay = document.getElementById('overlay');
    const cropBox = document.getElementById('cropBox');
    const sourceWrapper = document.getElementById('sourceWrapper');
    const previewCanvas = document.getElementById('previewCanvas');
    const originalCanvas = document.getElementById('originalCanvas');
    const processedCanvas = document.getElementById('processedCanvas');
    const exportBtn = document.getElementById('exportBtn');

    const keyColorInput = document.getElementById('keyColor');
    const thresholdInput = document.getElementById('threshold');
    const featherInput = document.getElementById('feather');
    const thresholdVal = document.getElementById('thresholdVal');
    const featherVal = document.getElementById('featherVal');
    const cropXInput = document.getElementById('cropX');
    const cropYInput = document.getElementById('cropY');
    const cropWInput = document.getElementById('cropW');
    const cropHInput = document.getElementById('cropH');

    let originalImage = null;
    let imgWidth = 0;
    let imgHeight = 0;
    let crop = { x: 0, y: 0, w: 0, h: 0 };
    let isDragging = false;
    let dragType = null; // 'move' or handle name
    let startPointer = { x: 0, y: 0 };
    let startCropDisplay = { x: 0, y: 0, w: 0, h: 0 };
    let scheduledProcess = false;

    const maxDist = Math.sqrt(255 * 255 * 3);

    function parseHex(hex) {
      const m = hex.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
      if (!m) return [0, 255, 0];
      return [parseInt(m[1], 16), parseInt(m[2], 16), parseInt(m[3], 16)];
    }

    function resetCrop() {
      crop = { x: 0, y: 0, w: imgWidth, h: imgHeight };
    }

    function getDisplayScale() {
      if (!imgWidth || !sourceImg.clientWidth) return { sx: 1, sy: 1 };
      return {
        sx: imgWidth / sourceImg.clientWidth,
        sy: imgHeight / sourceImg.clientHeight
      };
    }

    function clampCrop() {
      crop.x = Math.max(0, Math.min(crop.x, imgWidth));
      crop.y = Math.max(0, Math.min(crop.y, imgHeight));
      crop.w = Math.max(1, Math.min(crop.w, imgWidth - crop.x));
      crop.h = Math.max(1, Math.min(crop.h, imgHeight - crop.y));
    }

    function updateCropOverlay() {
      clampCrop();
      const { sx, sy } = getDisplayScale();
      const x = crop.x / sx;
      const y = crop.y / sy;
      const w = crop.w / sx;
      const h = crop.h / sy;
      cropBox.style.left = x + 'px';
      cropBox.style.top = y + 'px';
      cropBox.style.width = w + 'px';
      cropBox.style.height = h + 'px';

      cropXInput.value = Math.round(crop.x);
      cropYInput.value = Math.round(crop.y);
      cropWInput.value = Math.round(crop.w);
      cropHInput.value = Math.round(crop.h);
    }

    function updateCropFromInputs() {
      crop.x = parseInt(cropXInput.value, 10) || 0;
      crop.y = parseInt(cropYInput.value, 10) || 0;
      crop.w = parseInt(cropWInput.value, 10) || 1;
      crop.h = parseInt(cropHInput.value, 10) || 1;
      clampCrop();
      updateCropOverlay();
      updatePreview();
    }

    function processImage() {
      if (!originalImage) return;
      const ctx = processedCanvas.getContext('2d');
      const srcCtx = originalCanvas.getContext('2d');
      const imageData = srcCtx.getImageData(0, 0, imgWidth, imgHeight);
      const data = imageData.data;
      const [tr, tg, tb] = parseHex(keyColorInput.value);
      const threshold = parseFloat(thresholdInput.value);
      const feather = parseFloat(featherInput.value);

      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        const dr = r - tr;
        const dg = g - tg;
        const db = b - tb;
        const dist = Math.sqrt(dr * dr + dg * dg + db * db);
        const normalized = dist / maxDist * 255; // 映射到 0-255

        let a = 255;
        if (normalized <= threshold) {
          a = 0;
        } else if (feather > 0 && normalized < threshold + feather) {
          a = 255 * (normalized - threshold) / feather;
        }
        data[i + 3] = Math.max(0, Math.min(255, a));
      }

      ctx.putImageData(imageData, 0, 0);
      updatePreview();
    }

    function scheduleProcess() {
      if (scheduledProcess) return;
      scheduledProcess = true;
      requestAnimationFrame(() => {
        scheduledProcess = false;
        processImage();
      });
    }

    function updatePreview() {
      if (!originalImage) return;
      const rect = previewCanvas.parentElement.getBoundingClientRect();
      const wrapperW = rect.width - 2; // 减去边框
      const wrapperH = window.innerHeight * 0.55;
      const scale = Math.min(wrapperW / imgWidth, wrapperH / imgHeight, 1);
      const w = Math.floor(imgWidth * scale);
      const h = Math.floor(imgHeight * scale);
      previewCanvas.width = w;
      previewCanvas.height = h;
      previewCanvas.style.display = 'block';
      previewEmpty.style.display = 'none';

      const ctx = previewCanvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(processedCanvas, 0, 0, w, h);

      // 绘制裁剪框提示
      ctx.strokeStyle = '#00ffcc';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.strokeRect(
        crop.x * scale,
        crop.y * scale,
        crop.w * scale,
        crop.h * scale
      );
      ctx.setLineDash([]);
    }

    function loadImage(file) {
      if (!file || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const url = e.target.result;
        const img = new Image();
        img.onload = () => {
          originalImage = img;
          imgWidth = img.width;
          imgHeight = img.height;

          originalCanvas.width = imgWidth;
          originalCanvas.height = imgHeight;
          originalCanvas.getContext('2d').drawImage(img, 0, 0);

          processedCanvas.width = imgWidth;
          processedCanvas.height = imgHeight;

          resetCrop();
          emptyTip.style.display = 'none';
          sourceImg.style.display = 'block';
          overlay.style.display = 'block';
          sourceImg.src = url;
          exportBtn.disabled = false;

          // sourceImg 显示完成后再更新 overlay 尺寸
          sourceImg.onload = () => {
            updateCropOverlay();
            updatePreview();
          };
          processImage();
        };
        img.src = url;
      };
      reader.readAsDataURL(file);
    }

    function exportPNG() {
      if (!originalImage || crop.w <= 0 || crop.h <= 0) return;
      const canvas = document.createElement('canvas');
      canvas.width = crop.w;
      canvas.height = crop.h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(
        processedCanvas,
        crop.x, crop.y, crop.w, crop.h,
        0, 0, crop.w, crop.h
      );
      const url = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = url;
      a.download = 'green-screen-cropped.png';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    // 事件绑定
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => loadImage(e.target.files[0]));

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      loadImage(e.dataTransfer.files[0]);
    });

    keyColorInput.addEventListener('input', scheduleProcess);
    thresholdInput.addEventListener('input', () => {
      thresholdVal.textContent = thresholdInput.value;
      scheduleProcess();
    });
    featherInput.addEventListener('input', () => {
      featherVal.textContent = featherInput.value;
      scheduleProcess();
    });

    [cropXInput, cropYInput, cropWInput, cropHInput].forEach(input => {
      input.addEventListener('input', updateCropFromInputs);
    });

    exportBtn.addEventListener('click', exportPNG);

    window.addEventListener('resize', () => {
      if (!originalImage) return;
      updateCropOverlay();
      updatePreview();
    });

    // 裁剪框拖拽
    cropBox.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (e.target.classList.contains('handle')) {
        dragType = e.target.dataset.handle;
      } else {
        dragType = 'move';
      }
      isDragging = true;
      startPointer = { x: e.clientX, y: e.clientY };
      const { sx, sy } = getDisplayScale();
      startCropDisplay = {
        x: crop.x / sx,
        y: crop.y / sy,
        w: crop.w / sx,
        h: crop.h / sy
      };
      cropBox.setPointerCapture(e.pointerId);
    });

    cropBox.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      e.preventDefault();
      const dx = e.clientX - startPointer.x;
      const dy = e.clientY - startPointer.y;
      const overlayW = overlay.clientWidth;
      const overlayH = overlay.clientHeight;
      let { x, y, w, h } = { ...startCropDisplay };

      if (dragType === 'move') {
        x += dx;
        y += dy;
      } else {
        if (dragType.includes('e')) w += dx;
        if (dragType.includes('s')) h += dy;
        if (dragType.includes('w')) { x += dx; w -= dx; }
        if (dragType.includes('n')) { y += dy; h -= dy; }
      }

      // 限制并保证最小尺寸
      if (dragType === 'move') {
        x = Math.max(0, Math.min(x, overlayW - w));
        y = Math.max(0, Math.min(y, overlayH - h));
      } else {
        if (x < 0) { w += x; x = 0; }
        if (y < 0) { h += y; y = 0; }
        if (x + w > overlayW) w = overlayW - x;
        if (y + h > overlayH) h = overlayH - y;
        w = Math.max(20, w);
        h = Math.max(20, h);
      }

      const { sx, sy } = getDisplayScale();
      crop.x = Math.round(x * sx);
      crop.y = Math.round(y * sy);
      crop.w = Math.round(w * sx);
      crop.h = Math.round(h * sy);
      clampCrop();
      updateCropOverlay();
      updatePreview();
    });

    cropBox.addEventListener('pointerup', (e) => {
      isDragging = false;
      dragType = null;
      cropBox.releasePointerCapture(e.pointerId);
    });

    cropBox.addEventListener('pointercancel', () => {
      isDragging = false;
      dragType = null;
    });
  </script>
</body>
</html>
